<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <!-- Meta tag to refresh and redirect -->
    <meta http-equiv="refresh" content="0; url=/myresume/" />
    <script type="text/javascript">
      // JavaScript fallback if meta tag doesn't work
      window.location.replace("/myresume/");
    </script>
  </head>
  <body>
    <p>Page not found. Redirecting to the <a href="/myresume/">Home page</a>...</p>
  </body>
</html>

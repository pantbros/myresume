<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <script type="text/javascript">
      // Check if the current URL matches a route handled by React Router
      if (!window.location.pathname.startsWith("/myresume/")) {
        // Redirect to the homepage (index.html) only if it's not a valid React route
        window.location.replace("/myresume/");
      }
    </script>
  </head>
  <body>
    <p>Page not found. Redirecting to the <a href="/myresume/">Home page</a>...</p>
  </body>
</html>
